<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Протокол</title>
  <link rel="stylesheet" href="/css/root.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="wrap">
    <h2>Протокол</h2>

    <div class="row-inline">
      <div class="field-col">
        <label>Номер</label>
        <input id="p_num" type="text" maxlength="6" class="w-num">
      </div>
      <div class="field-col">
        <label>Дата протокола</label>
        <input id="p_date" type="date" class="w-date">
      </div>
    </div>

    <label>Статус</label>
    <div class="segmented">
      <input type="radio" id="st_open" name="p_status" value="open" checked>
      <label for="st_open">Открыт</label>
      <input type="radio" id="st_closed" name="p_status" value="closed">
      <label for="st_closed">Закрыт</label>
    </div>

    <label>Тип голосования</label>
    <div class="segmented">
      <input type="radio" id="vt_secret" name="p_type" value="secret" checked>
      <label for="vt_secret">Тайное</label>
      <input type="radio" id="vt_open" name="p_type" value="open">
      <label for="vt_open">Открытое</label>
    </div>

    <label>Файл протокола</label>
    <div class="row">
      <input id="p_file_name" type="text" readonly class="file-name">
      <button onclick="triggerProtocolFile()">Выбрать</button>
    </div>
    <input id="p_file" type="file" style="display:none" />

    <div class="card questions-box">
      <div class="row">
        <label>Количество вопросов</label>
        <input type="number" id="p_qcount" min="1" max="99">
      </div>
      <div class="row q-actions">
        <button id="btnQuorum" onclick="toggleQuorumDefault()">Кворум: 1/2</button>
        <button onclick="openQuestions()">Список</button>
      </div>
    </div>

    <h3>Приложения</h3>
    <table id="materialsTable">
      <tbody></tbody>
    </table>

    <div class="actions">
      <button class="btn edit" onclick="openResults()">Результаты</button>
      <button class="btn exit" onclick="exitCard()">Выход</button>
    </div>
  </div>

  <input type="file" id="p_materials" multiple style="display:none" />

  <script src="/js/common.js"></script>
  <script src="/js/af_protocol.js"></script>
</body>
</html>

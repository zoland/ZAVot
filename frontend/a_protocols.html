  <title>Протоколы</title>
  <link rel="stylesheet" href="/css/root.css">

</head>
<body>
<div class="app">
  <div class="topbar">
    <h2>Протоколы</h2>
  </div>

  <div class="table-wrap">

      <thead>
        <tr><th>№</th><th>Файл</th><th>Дата протокола</th><th>Статус</th><th>Тип</th></tr>

      </tbody>
    </table>
  </div>

  <div class="actions">
    <button class="btn exit" onclick="exitPage()">Выход</button>
  </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/a_protocols.js"></script>
</body>
</html>
